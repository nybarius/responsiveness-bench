name: Reconstruct v0.2

on:
  push:
    branches: [main]
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  reconstruct:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Restore snapshot
        run: |
          cat .bootstrap/part-* | base64 -d > /tmp/v02.tar.gz
          tar -xzf /tmp/v02.tar.gz
          rm -rf .bootstrap .github/workflows/bootstrap-v02.yml
      - name: Verify
        run: |
          python -m pip install -e . pytest
          pytest
          python -m compileall -q src tests
          responsiveness-bench validate data/seed.jsonl
          responsiveness-bench audit data/seed.jsonl --check
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Implement inference-mode protocol v0.2"
          git push
